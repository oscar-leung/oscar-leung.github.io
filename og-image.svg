<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080d1a"/>
      <stop offset="100%" style="stop-color:#0f1a35"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:rgba(56,189,248,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1.5" cy="1.5" r="1.5" fill="rgba(56,189,248,0.07)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent top bar -->
  <rect x="60" y="60" width="300" height="3" fill="url(#accent-line)" rx="2"/>

  <!-- Name -->
  <text x="60" y="160" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" fill="#e2e8f0">Oscar Leung</text>

  <!-- Role -->
  <text x="60" y="225" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="400" fill="#38bdf8">Software Engineer  ·  QA Automation  ·  SDET</text>

  <!-- Divider -->
  <rect x="60" y="255" width="1080" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Stats row -->
  <text x="60"  y="310" font-family="'Fira Code', monospace" font-size="22" fill="#94a3b8">🎓 B.S. Computer Science — SJSU</text>
  <text x="60"  y="350" font-family="'Fira Code', monospace" font-size="22" fill="#94a3b8">🛸 Maxar Technologies  ·  State of Illinois  ·  Location Labs / Avast</text>
  <text x="60"  y="390" font-family="'Fira Code', monospace" font-size="22" fill="#94a3b8">☁️  Google Cloud Certified ×5  ·  5+ Years Experience</text>

  <!-- Tech badges row -->
  <rect x="60"  y="430" width="120" height="36" rx="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="120" y="453" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">Python</text>

  <rect x="196" y="430" width="110" height="36" rx="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="251" y="453" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">Selenium</text>

  <rect x="320" y="430" width="130" height="36" rx="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="385" y="453" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">Playwright</text>

  <rect x="464" y="430" width="90" height="36" rx="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="509" y="453" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">Java</text>

  <rect x="568" y="430" width="130" height="36" rx="6" fill="rgba(56,189,248,0.12)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="633" y="453" font-family="monospace" font-size="16" fill="#38bdf8" text-anchor="middle">GCP ×5 Certs</text>

  <!-- Available badge -->
  <rect x="860" y="430" width="280" height="36" rx="18" fill="rgba(74,222,128,0.12)" stroke="rgba(74,222,128,0.35)" stroke-width="1.5"/>
  <circle cx="888" cy="448" r="6" fill="#4ade80"/>
  <text x="904" y="453" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#4ade80">Open to Work — Bay Area</text>

  <!-- URL footer -->
  <text x="60" y="575" font-family="'Fira Code', monospace" font-size="20" fill="#38bdf8">oscar-leung.github.io</text>
  <text x="1140" y="575" font-family="'Fira Code', monospace" font-size="20" fill="#4b5a73" text-anchor="end">github.com/oscar-leung</text>
</svg>